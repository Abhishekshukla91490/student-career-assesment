<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="admin.css" />
    <style>
      .login-card{max-width:420px;margin:80px auto;padding:18px;background:#fff;border-radius:8px;border:2px solid #1A6B5E}
      .login-card h2{margin-top:0;color:#1A6B5E;border-bottom:3px solid #FFC107;padding-bottom:12px}
      .field{margin:8px 0}
      .field label{color:#1A6B5E;font-weight:600}
      .field input{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px}
      .hint{font-size:13px;color:#666;margin-top:8px}
    </style>
  </head>
  <body>
    <main class="admin-container">
      <div class="login-card">
        <h2>Admin Login</h2>
        <form id="loginForm">
          <div class="field">
            <label>Password</label>
            <input id="password" type="password" placeholder="Enter admin password" required />
          </div>
          <div style="display:flex;gap:8px;margin-top:8px;">
            <button type="submit" class="btn primary">Login</button>
          </div>
        </form>
      </div>
    </main>
    <script src="admin-login.js"></script>
  </body>
</html>
